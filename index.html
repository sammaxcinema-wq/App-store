    (function setupPwaManifest() {

      const manifest = {

        description: 'Meon App Directory – Launch web apps instantly',
        start_url: location.href.split('?')[0],
        display: 'standalone',
        orientation: 'any',
        background_color: '#0f172a',
        theme_color: '#0f172a',
        categories: ['productivity', 'utilities', 'developer tools'],
        icons: [
          { src: iconUrl, sizes: '72x72', type: 'image/png' },
          { src: iconUrl, sizes: '96x96', type: 'image/png' },
          { src: iconUrl, sizes: '128x128', type: 'image/png' },
          { src: iconUrl, sizes: '144x144', type: 'image/png' },
          { src: iconUrl, sizes: '152x152', type: 'image/png' },
          { src: iconUrl, sizes: '180x180', type: 'image/png' },
          { src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
          { src: iconUrl, sizes: '384x384', type: 'image/png' },
          { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ],
        shortcuts: [
          { name: 'Explore Apps', url: '/?nav=home', description: 'Browse all web apps' },
          { name: 'Favorites', url: '/?nav=dashboard', description: 'Your favorite apps' }
        ],
        scope: '/'
      };

      const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      const manifestUrl = URL.createObjectURL(manifestBlob);

      const linkEl = document.createElement('link');
      linkEl.rel = 'manifest';
      linkEl.href = manifestUrl;
      document.head.appendChild(linkEl);

      window._pwaManifestUrl = manifestUrl;
      window._pwaManifest = manifest;
    })();

    // ============================================================
    // PWA: Service Worker Registration
    // ============================================================
    (function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        console.log('[PWA] Service workers not supported');
        return;
      }

      const CACHE_NAME = 'meon-directory-v2';
      const urlsToCache = [
        location.href.split('?')[0],
        'https://cdn.tailwindcss.com',
        'https://unpkg.com/lucide@latest',
        'https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap',
        'https://i.ibb.co/VY0yR03N/file-00000000503c724692cbd3d68fec0056.png'
      ];

      const swCode = `
          const CACHE_NAME = '${CACHE_NAME}';
          const urlsToCache = ${JSON.stringify(urlsToCache)};

          self.addEventListener('install', (event) => {
            console.log('[SW] Installing...');
            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => {
                console.log('[SW] Caching app shell');
                return cache.addAll(urlsToCache).catch((err) => {
                  console.warn('[SW] Some assets failed to cache:', err);
                });
              }).then(() => {
                return self.skipWaiting();
              })
            );
          });

          self.addEventListener('activate', (event) => {
            console.log('[SW] Activating...');
            event.waitUntil(
              caches.keys().then((cacheNames) => {
                return Promise.all(
                  cacheNames.map((cache) => {
                    if (cache !== CACHE_NAME) {
                      console.log('[SW] Deleting old cache:', cache);
                      return caches.delete(cache);
                    }
                  })
                );
              }).then(() => {
                return self.clients.claim();
              })
            );
          });

          self.addEventListener('fetch', (event) => {
            if (event.request.method !== 'GET') return;
            if (event.request.url.startsWith('chrome-extension://')) return;

            event.respondWith(
              fetch(event.request)
                .then((networkResponse) => {
                  if (networkResponse && networkResponse.status === 200) {
                    const responseClone = networkResponse.clone();
                    caches.open(CACHE_NAME).then((cache) => {
                      try {
                        cache.put(event.request, responseClone);
                      } catch (e) {}
                    });
                  }
                  return networkResponse;
                })
                .catch(() => {
                  return caches.match(event.request).then((cachedResponse) => {
                    if (cachedResponse) return cachedResponse;
                    if (event.request.mode === 'navigate') {
                      return caches.match(urlsToCache[0]);
                    }
                    return new Response('Offline – resource not cached', {
                      status: 503,
                      statusText: 'Service Unavailable'
                    });
                  });
                })
            );
          });

          self.addEventListener('push', (event) => {
            const options = {
              body: event.data ? event.data.text() : 'New update from Meon Directory',
              icon: 'https://i.ibb.co/VY0yR03N/file-00000000503c724692cbd3d68fec0056.png',
              badge: 'https://i.ibb.co/VY0yR03N/file-00000000503c724692cbd3d68fec0056.png',
              vibrate: [200, 100, 200],
              data: { url: self.location.origin }
            };
            event.waitUntil(
              self.registration.showNotification('Meon Directory', options)
            );
          });

          self.addEventListener('notificationclick', (event) => {
            event.notification.close();
            event.waitUntil(
              clients.openWindow(event.notification.data.url || self.location.origin)
            );
          });
        `;

      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);

      navigator.serviceWorker.register(swUrl, { scope: '/' })
        .then((registration) => {
          console.log('[PWA] Service Worker registered with scope:', registration.scope);
          window._pwaSwRegistration = registration;
          window._pwaSwUrl = swUrl;

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[PWA] New content available – refresh to update');
                }
              });
            }
          });
        })
        .catch((err) => {
          console.warn('[PWA] Service Worker registration failed:', err);
        });
    })();

    // ============================================================
    // PWA: Install Prompt Handling
    // ============================================================
    let deferredPrompt = null;
    let pwaBannerDismissed = false;
    let pwaBannerDismissTime = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('[PWA] Install prompt available');

      const dismissTime = localStorage.getItem('meonPwaBannerDismissTime');
      if (dismissTime) {
        const hoursSince = (Date.now() - parseInt(dismissTime)) / (1000 * 60 * 60);
        if (hoursSince < 48) {
          pwaBannerDismissed = true;
        } else {
          localStorage.removeItem('meonPwaBannerDismissTime');
          pwaBannerDismissed = false;
        }
      }

      if (!pwaBannerDismissed) {
        setTimeout(() => {
          document.getElementById('pwaInstallBanner')?.classList.add('show');
        }, 1500);
      }

      document.getElementById('headerInstallBtn')?.classList.remove('hidden');
    });

    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App installed successfully!');
      deferredPrompt = null;
      document.getElementById('pwaInstallBanner')?.classList.remove('show');
      document.getElementById('headerInstallBtn')?.classList.add('hidden');
      showToast('🎉 Meon installed! Launch from your home screen.', 'success');
    });

    document.addEventListener('DOMContentLoaded', () => {
      const installBannerBtn = document.getElementById('pwaInstallBtn');
      const dismissBannerBtn = document.getElementById('pwaDismissBtn');
      const headerInstallBtn = document.getElementById('headerInstallBtn');

      function triggerInstall() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('[PWA] User accepted install');
            } else {
              console.log('[PWA] User dismissed install');
            }
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
            if (headerInstallBtn) headerInstallBtn.classList.add('hidden');
          });
        } else {
          showToast('Install option not available right now. Try refreshing.', 'info');
        }
      }

      if (installBannerBtn) {
        installBannerBtn.addEventListener('click', triggerInstall);
      }

      if (dismissBannerBtn) {
        dismissBannerBtn.addEventListener('click', () => {
          document.getElementById('pwaInstallBanner')?.classList.remove('show');
          pwaBannerDismissed = true;
          localStorage.setItem('meonPwaBannerDismissTime', Date.now().toString());
          if (headerInstallBtn && deferredPrompt) {
            headerInstallBtn.classList.remove('hidden');
          }
          showToast('You can install later from the header 📲', 'info');
        });
      }

      if (headerInstallBtn) {
        headerInstallBtn.addEventListener('click', triggerInstall);
      }
    });

    // PWA: Online/Offline Status
    // ============================================================

      const indicator = document.getElementById('offlineIndicator');
      if (!navigator.onLine) {
        indicator?.classList.add('show');
      } else {
        indicator?.classList.remove('show');
      }
    }

    window.addEventListener('online', () => {
      updateOnlineStatus();
      showToast('🌐 Back online!', 'success');

    window.addEventListener('offline', () => {
      updateOnlineStatus();
      showToast('⚠️ You are offline. Cached apps still work.', 'info');

      const idx = userFavorites.indexOf(appId);
      if (idx === -1) { userFavorites.push(appId);
        showToast("Added to favorites", "success"); } else { userFavorites.splice(idx, 1);

    function submitReview(appId, rating, content) {
      if (!currentUser) { showToast("Login to review", "error"); return false; }
      if (!reviewsData[appId]) reviewsData[appId] = [];
      reviewsData[appId].push({ userId: currentUser.id, user: currentUser.name, rating, content,
        date: new Date().toISOString() });
      const allRatings = reviewsData[appId].map(r => r.rating);
      const avg = allRatings.reduce((a, b) => a + b, 0) / allRatings.length;
      const appObj = appList.find(a => a.id === appId);
      if (appObj) { appObj.rating = parseFloat(avg.toFixed(1));
        appObj.ratingCount = allRatings.length; }
      saveState();
      showToast("Review submitted", "success");
      renderCurrentView();
      return true;
    }

      if (activeCategoryFilter) {
        filtered = filtered.filter(app => app.category.toLowerCase() === activeCategoryFilter.toLowerCase());
      }
      return filtered;

      const heroHtml =
        `<div class="relative w-full max-w-6xl mx-auto overflow-hidden bg-gradient-to-br from-[#020024] via-[#050537] to-[#0a005c] p-6 md:p-8 rounded-3xl border border-purple-900/40 text-white shadow-xl mb-8"><div class="flex flex-col md:flex-row justify-between items-center gap-6"><div><h1 class="text-4xl md:text-5xl font-extrabold">Meon Directory</h1><p class="text-purple-200 mt-2">Launch web apps instantly · No payments · No downloads</p><div class="flex gap-4 mt-4"><button id="exploreMarketplaceBtn" class="bg-purple-600 px-5 py-2 rounded-full text-sm font-semibold hover:bg-purple-500">Explore Apps →</button><button id="becomeDevBtn" class="border border-purple-400 px-5 py-2 rounded-full text-sm">Become a Developer</button></div></div><div class="bg-white/10 backdrop-blur rounded-2xl p-4 text-center"><div class="text-3xl font-bold">${appList.length}+</div><div class="text-xs">Web Apps</div></div></div></div>`;
      return `${heroHtml}<div class="space-y-10"><div class="bg-white/10 dark:bg-gray-800/50 rounded-2xl p-4 flex items-center gap-3"><i data-lucide="search"></i><input type="text" id="globalSearchInput" placeholder="Search apps by name, category..." class="w-full bg-transparent outline-none" value="${searchQuery.replace(/"/g, '&quot;')}"></div><div><h2 class="text-2xl font-bold mb-4">Categories</h2><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">${categoryItems.map(cat => `<div class="rounded-xl bg-gradient-to-r ${cat.gradient} text-white p-3 text-center text-sm font-semibold cursor-pointer hover:scale-105 transition category-chip" data-category="${cat.filter}">${cat.name}</div>`).join('')}${activeCategoryFilter ? `<div class="rounded-xl bg-gray-500 text-white p-3 text-center cursor-pointer" id="clearCategoryBtn">Clear ✕</div>` : ""}</div></div><div><h2 class="text-2xl font-bold mb-4">⭐ Featured</h2><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${featured.map(app=>appCard(app)).join('')}</div></div><div><h2 class="text-2xl font-bold mb-4">🔥 Top Rated</h2><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${trending.map(app=>appCard(app)).join('')}</div></div><div><h2 class="text-2xl font-bold mb-4">🆕 Recently Added</h2><div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">${newReleases.map(app=>appCard(app)).join('')}</div></div></div>`;
    }

    function renderCurrentView() {
      const container = document.getElementById("mainContent");
      if (!container) return;
      if (selectedApp) { container.innerHTML = renderAppDetail(); } else if (activeView === "home") { container.innerHTML =
          renderHome();
        setTimeout(() => {
          const searchInput = document.getElementById("globalSearchInput");
          if (searchInput) {
            searchInput.addEventListener("input", (e) => { searchQuery = e.target.value;
              renderCurrentView(); });
          }
          document.querySelectorAll(".category-chip").forEach(c => c.addEventListener("click", () => {
            activeCategoryFilter = c.dataset.category;
            renderCurrentView();
          }));
          document.getElementById("clearCategoryBtn")?.addEventListener("click", () => { activeCategoryFilter = "";
            renderCurrentView(); });
          document.getElementById("exploreMarketplaceBtn")?.addEventListener("click", () => document.querySelector(
            ".grid.sm\\:grid-cols-2")?.scrollIntoView({ behavior: "smooth" }));
          document.getElementById("becomeDevBtn")?.addEventListener("click", () => { if (!currentUser) showToast(
              "Please login first", "error");
            else { activeView = "developer";
              renderCurrentView(); } });
        }, 50); } else if (activeView === "dashboard") container.innerHTML = renderDashboard();
      else if (activeView === "admin") container.innerHTML = renderAdmin();
      else if (activeView === "developer") container.innerHTML = renderDeveloper();
      if (window.lucide) lucide.createIcons();
      if (selectedApp && document.getElementById("reviewStars")) {
        let ratingVal = 0;
        const starDiv = document.getElementById("reviewStars");
        starDiv.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
          let star = document.createElement('i');
          star.setAttribute('data-lucide', 'star');
          star.className = 'w-6 h-6 cursor-pointer rating-star';
          star.onclick = () => { ratingVal = i;
            document.querySelectorAll('#reviewStars i').forEach((s, idx) => s.style.fill = idx < i ? '#facc15' :
              'none'); };
          starDiv.appendChild(star);
        }
        lucide.createIcons();
        document.getElementById("submitReviewBtn")?.addEventListener("click", () => {
          const txt = document.getElementById("reviewText").value;
          if (ratingVal && txt) submitReview(selectedApp.id, ratingVal, txt);
          else showToast("Please provide rating and comment", "error");
        });
      }
    }

    // Navigation & theme init
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const view = btn.getAttribute("data-nav");
        if (view) { activeView = view;
          selectedApp = null;
          renderCurrentView(); }
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("border-purple-600",
          "text-purple-600"));
        btn.classList.add("border-purple-600", "text-purple-600");
      });
    });

    function renderNav() {
      const authDiv = document.getElementById("authSection");
      if (!authDiv) return;
      if (currentUser) {
        authDiv.innerHTML =
          `<span class="text-sm hidden sm:inline">${currentUser.email}</span><button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm">Logout</button>`;
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        document.getElementById("adminNavBtn")?.classList.toggle("hidden", currentUser.role !== 'admin' && currentUser
          .role !== 'super_admin');
        document.getElementById("devNavBtn")?.classList.toggle("hidden", currentUser.role !== 'developer');
      } else {
        authDiv.innerHTML =
          `<button id="showLoginModalBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-1.5 rounded-lg text-sm">Sign In</button>`;
        document.getElementById("showLoginModalBtn")?.addEventListener("click", () => showAuthModal());
        document.getElementById("adminNavBtn")?.classList.add("hidden");
        document.getElementById("devNavBtn")?.classList.add("hidden");
      }
      lucide.createIcons();
    }

    function showAuthModal() {
      const modalHtml =
        `<div id="authModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-full max-w-md"><h2 class="text-2xl font-bold mb-4">Meon Account</h2><input type="email" id="loginEmail" placeholder="Email" class="w-full p-2 border rounded-lg dark:bg-gray-700 mb-3"><input type="password" id="loginPassword" placeholder="Password (any)" class="w-full p-2 border rounded-lg dark:bg-gray-700 mb-4"><div class="flex gap-2 mb-3"><button id="loginEmailBtn" class="flex-1 bg-purple-600 text-white py-2 rounded-lg">Login</button><button id="registerBtn" class="flex-1 bg-green-600 text-white py-2 rounded-lg">Sign Up</button></div><button id="demoAdminBtn" class="w-full bg-purple-100 dark:bg-purple-900 py-2 rounded-lg mb-2">Demo Admin Access</button><button id="demoDevBtn" class="w-full bg-amber-100 dark:bg-amber-900 py-2 rounded-lg">Demo Developer Access</button><button id="closeModal" class="w-full mt-3 text-gray-500">Cancel</button></div></div>`;
      document.body.insertAdjacentHTML("beforeend", modalHtml);
      document.getElementById("loginEmailBtn")?.addEventListener("click", () => { const email = document.getElementById(
          "loginEmail").value;
        if (email) loginUser(email, "user");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("registerBtn")?.addEventListener("click", () => { const email = document.getElementById(
          "loginEmail").value;
        if (email) loginUser(email, "user");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("demoAdminBtn")?.addEventListener("click", () => { loginUser("admin@meon.com", "admin");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("demoDevBtn")?.addEventListener("click", () => { loginUser("dev@meon.com", "developer");
        document.getElementById("authModal")?.remove(); });
      document.getElementById("closeModal")?.addEventListener("click", () => document.getElementById("authModal")?.remove());
    }
    const themeToggle = document.getElementById("themeToggle");
    themeToggle?.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
      localStorage.setItem("meonTheme", document.documentElement.classList.contains("dark") ? "dark" : "light");
      lucide.createIcons();
    });
    if (localStorage.getItem("meonTheme") === "dark") document.documentElement.classList.add("dark");
    renderNav();
    renderCurrentView();
    updateOnlineStatus();
  </script>
</body>
</html>
